name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check resources/holmesMcpd/ tests/
      - run: ruff format --check resources/holmesMcpd/ tests/

  unit:
    name: Tests unitaires
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installer dépendances test
        run: pip install mcp httpx sqlparse structlog pymysql pytest pytest-asyncio pytest-cov
      - name: Tests unitaires
        run: pytest tests/unit/ -v --cov=resources/holmesMcpd --cov-report=term-missing

  # Les tests d'intégration (tests/integration/) s'exécutent sur la box réelle via SSH
  # (ADR-0012 + ADR-0018) — pas de job Docker en CI.
